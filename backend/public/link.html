<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fill in personnel information</title>
    <!-- 引入样式 -->
    <link rel="stylesheet" href="/js/index.css">
    <!-- 引入组件库 -->
    <script src="/js/vue.min.js"></script>
    <script src="/js/axios.min.js"></script>
    <script src="/js/index.js"></script>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        /* 添加一些简单的样式 */
        .question {
            margin-bottom: 20px;
        }

        p {
            font-size: 14px;
            margin: 20px 0 10px;
        }

        a {
            background-color: #F9F9F9;
            border-radius: 10px;
            margin-top: 10px;
            display: block;
            color: #666;
            text-decoration: none;
            cursor: pointer;
        }

        a:hover {
            background-color: #ff8d32;
            color: #fff;
        }

        label {
            display: block;
            padding: 20px;
            cursor: pointer;
        }

        label input {
            visibility: hidden;
        }
        .v2-loading {
        display: flex;
        padding: 20px;
        justify-content: center;
        width: 100%;
        box-sizing: border-box;
      }

      .v2-loading .loading {
        width: 80px;
        height: 64px;
        display: flex;
        justify-content: center;
      }

      .v2-loading .loading div {
        width: 6px;
        height: 44px;
        margin: 4px;
        margin-top: 0;
        margin-bottom: 0;
        background-color: rgb(0,210,100);
        -webkit-animation: line-scale-pulse-out-rapid 0.9s infinite cubic-bezier(0.11, 0.49, 0.38, 0.78);
        -moz-animation: line-scale-pulse-out-rapid 0.9s infinite cubic-bezier(0.11, 0.49, 0.38, 0.78);
        -o-animation: line-scale-pulse-out-rapid 0.9s infinite cubic-bezier(0.11, 0.49, 0.38, 0.78);
        animation: line-scale-pulse-out-rapid 0.9s infinite cubic-bezier(0.11, 0.49, 0.38, 0.78)
      }

      .v2-loading .loading div:nth-child(3) {
        -webkit-animation-delay: -.9s;
        -moz-animation-delay: -.9s;
        -o-animation-delay: -.9s;
        animation-delay: -.9s;
      }

      .v2-loading .loading div:nth-child(2),
      .v2-loading .loading div:nth-child(4) {
        -webkit-animation-delay: -.65s;
        -moz-animation-delay: -.65s;
        -o-animation-delay: -.65s;
        animation-delay: -.65s;
      }

      .v2-loading .loading div:nth-child(1),
      .v2-loading .loading div:nth-child(5) {
        -webkit-animation-delay: -.4s;
        -moz-animation-delay: -.4s;
        -o-animation-delay: -.4s;
        animation-delay: -.4s;
      }

      @-webkit-keyframes line-scale-pulse-out-rapid {
        0% {
          -webkit-transform: scaley(1);
          transform: scaley(1)
        }

        80% {
          -webkit-transform: scaley(0.3);
          transform: scaley(0.3)
        }

        90% {
          -webkit-transform: scaley(1);
          transform: scaley(1)
        }
      }

      @-moz-keyframes line-scale-pulse-out-rapid {
        0% {
          -moz-transform: scaley(1);
          transform: scaley(1)
        }

        80% {
          -moz-transform: scaley(0.3);
          transform: scaley(0.3)
        }

        90% {
          -moz-transform: scaley(1);
          transform: scaley(1)
        }
      }

      @-o-keyframes line-scale-pulse-out-rapid {
        0% {
          -o-transform: scaley(1);
          transform: scaley(1)
        }

        80% {
          -o-transform: scaley(0.3);
          transform: scaley(0.3)
        }

        90% {
          -o-transform: scaley(1);
          transform: scaley(1)
        }
      }

      @keyframes line-scale-pulse-out-rapid {
        0% {
          -webkit-transform: scaley(1);
          -moz-transform: scaley(1);
          -o-transform: scaley(1);
          transform: scaley(1)
        }

        80% {
          -webkit-transform: scaley(0.3);
          -moz-transform: scaley(0.3);
          -o-transform: scaley(0.3);
          transform: scaley(0.3)
        }

        90% {
          -webkit-transform: scaley(1);
          -moz-transform: scaley(1);
          -o-transform: scaley(1);
          transform: scaley(1)
        }
      }
    </style>
</head>

<body>
    <!-- 答题界面的HTML结构将放在这里 -->
    <div id="quiz-app">
        <div
            style="display: flex;align-items: center;flex-direction: column;width: 100vw;height:100vh;padding:100px;box-sizing:border-box;overflow-y:scroll;">
             <div style="padding:40px 40px 40px;background-color: #fff;box-shadow: 0 0 5px #dbdbdb;border-radius: 20px;width:500px;max-width:80%;" v-if="!loading">
                <div class="question">
                    <div v-for="item in questions">
                        <div class="item" v-if="item.type=='select'">
                            <p>{{item.text}}</p>
                            <el-select v-model="item.value"  :placeholder="item.holder ? item.holder : '请选择'+item.text" style="width:100%" size="small">
                                <el-option v-for="c in item.options" :label="c.value" :value="c.value" multiple></el-option>
                            </el-select>
                        </div>
                        <div class="item" v-if="item.type=='radio'">
                            <p>{{item.text}}</p>
                            <el-select v-model="item.value"  :placeholder="item.holder ? item.holder : '请选择'+item.text" style="width:100%" size="small">
                                <el-option v-for="c in item.options" :label="c.value" :value="c.value"></el-option>
                            </el-select>
                        </div>
                        <div class="item" v-if="item.type=='date'">
                            <p>{{item.text}}</p>
                            <el-date-picker  style="width:100%" v-model="item.value" type="date" :placeholder="item.holder ? item.holder : '请选择'+item.text" size="small" value-format="timestamp">
                            </el-date-picker>
                        </div>
                        <div class="item" v-if="item.type=='input'">
                            <p>{{item.text}}</p>
                            <el-input type="text" v-model="item.value" :placeholder="item.holder ? item.holder : '请输入'+item.text" size="small"></el-input>
                        </div>
                    </div>
                </div>
                <el-button type="primary" style="width:100%" size="normal" @click="submitAnswers">Submit</el-button>
            </div>
            <div class="v2-loading" v-else>
        <div class="loading">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
      </div>
        </div>
    </div>

    <script>
        new Vue({
            el: '#quiz-app',
            data: {
                currentQuestion: 1,
                answers: [],
                questions: [
                ],
                loading:true,
                params: {},
            },
            created() {
                this.params = this.getUrlParams();
                axios.get('/api/index/topic?pid='+this.params.pid+'&key='+this.params.key+'&platform_id='+this.params.platform_id)
                .then(response => {
                    const data = response.data;
                    this.loading = false;
                    if(data.code == 200){
                        this.questions = [];
                        data.data.forEach(item => {
                            this.questions.push({
                                text: item.persona_data_name,
                                type: item.persona_data_type,
                                id:item.persona_data_id,
                                holder:item.persona_data_holder,
                                options: item.persona_data_values,
                                value:''
                            })
                        })
                    }
                })
            },
            methods: {
                getUrlParams() {
                    const params = new URLSearchParams(window.location.search);
                    let paramsObj = {};
                    for (const [key, value] of params.entries()) {
                        paramsObj[key] = value;
                    }
                    return paramsObj;
                },
                submitAnswers() {
                    if(this.params.platform_id){
                        var url = '/api/member.Platform/wall_link?pid='+this.params.platform_id+'&key='+this.params.key;
                    } else {
                        var url = '/api/member.Platform/link?pid='+this.params.pid+'&key='+this.params.key;
                    }
                    this.questions.forEach(item => {
                        url +='&anser['+item.id+']='+item.value;
                    })
                    window.location.href = url;
                },
            },
            computed: {
                currentQuestionData() {
                    return this.questions[this.currentQuestion - 1];
                },
            },
        });
    </script>
</body>

</html>
