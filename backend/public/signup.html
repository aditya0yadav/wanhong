<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title itemprop="name">Welcome to WanHongSurvey Surveys</title>
    <meta name="keywords" content="Welcome to WanHongSurvey Surveys">
    <meta name="description" content="Welcome to WanHongSurvey Surveys">
    <!-- Google Web Fonts -->
    <link href="./assets/css2.css" rel="stylesheet">
    <link href="./assets/all.min.css" rel="stylesheet">
    <link href="./assets/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="./assets/owl.carousel.min.css" rel="stylesheet">
    <link href="./assets/animate.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="./assets/bootstrap.min.css" rel="stylesheet">
    <link href="./assets/cookiepolicy.css" rel="stylesheet">
    <!-- Template Stylesheet -->
    <link href="./assets/style.css" rel="stylesheet">
</head>

<body style="width: 100%;height: 100%;overflow: hidden;background: url(./assets/images/lgbg.jpg) no-repeat;background-size: cover;">
    <div class="d-flex align-items-center justify-content-center vh-100 vw-100">
        <div class="signin-inner p-5 bg-white rounded" style="width: 720px;max-width: 90%;">
            <div class="d-flex align-items-center justify-content-center pb-5">
                <img src="./assets/logo.svg" style="height:60px;">
            </div>
            <h1 class="color-dark">Register & Start Earning!</h1>
            <p>Already have an account? <a href="/login.html">Login</a></p>
            <form class="form-signin">
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" class="form-control border-0 bg-light px-4" placeholder="First Name" style="height: 45px;">
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control border-0 bg-light px-4" placeholder="Last Name" style="height: 45px;">
                    </div>
                    <div class="col-md-6">
                        <select class="form-select border-0 bg-light px-4" placeholder="Select Gender" style="height: 45px;">
                            <option value="">Select Gender</option>
                            <option value="1">Male</option>
                            <option value="2">Female</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control border-0 bg-light px-4" placeholder="Date of Birth" style="height: 45px;">
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control border-0 bg-light px-4" placeholder="Enter email address" style="height: 45px;">
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control border-0 bg-light px-4" placeholder="Enter Mobile Number" style="height: 45px;">
                    </div>
                    <div class="col-md-6">
                        <select class="form-select border-0 bg-light px-4" placeholder="Select Country" style="height: 45px;">
                            <option value="">Select Country</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <select class="form-select border-0 bg-light px-4" placeholder="Select State/Zone" style="height: 45px;">
                            <option value="">Select State/Zone</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control border-0 bg-light px-4" placeholder="Enter State" style="height: 45px;">
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control border-0 bg-light px-4" placeholder="Enter zip code" style="height: 45px;">
                    </div>
                    <div class="col-md-6">
                        <input type="password" class="form-control border-0 bg-light px-4" placeholder="Enter password" style="height: 45px;">
                        <p class="mt-2">Min. 6 characters required.</p>
                    </div>
                    <div class="col-md-6">
                        <input type="password" class="form-control border-0 bg-light px-4" placeholder="Confirm Password" style="height: 45px;">
                    </div>
                    <div class="col-12">
                        <select class="form-select border-0 bg-light px-4" placeholder="Preferred Lanquage for Survey" style="height: 45px;">
                            <option value="">Preferred Lanquage for Survey</option>
                            <option value="">English</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <p><input type="checkbox" class="me-2" />I agree to Gowebsurveys Terms Of Use and Privacy Policy.</p>
                <button class="btn btn-primary w-100 py-3 mt-3" type="submit">Register</button>
                    </div>
                </div>
                
            </form>
        </div>
    </div>
    <!-- Footer End -->
    <!-- JavaScript Libraries -->
    <script src="./assets/jquery-3.4.1.min.js"></script>
    <script src="./assets/bootstrap.bundle.min.js"></script>
    <script src="./assets/wow.min.js"></script>
    <script src="./assets/easing.min.js"></script>
    <script src="./assets/waypoints.min.js"></script>
    <script src="./assets/counterup.min.js"></script>
    <script src="./assets/owl.carousel.min.js"></script>
    <script src="./assets/cookieconsent.min.js" data-cfasync="false"></script>
    <script src="./assets/1.js"></script>
    <!-- Template Javascript -->
    <script src="./assets/main.js"></script>



</body>

</html>
